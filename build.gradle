plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.3'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.finalproject'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

// [핵심 수정] Java 컴파일 시 파라미터 이름을 유지하도록 설정합니다.
tasks.withType(JavaCompile) {
    options.compilerArgs.add '-parameters'
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.thymeleaf.extras:thymeleaf-extras-springsecurity6'
 	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-websocket'
	implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'nz.net.ultraq.thymeleaf:thymeleaf-layout-dialect'
	compileOnly 'org.projectlombok:lombok'
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	runtimeOnly 'com.mysql:mysql-connector-j'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.security:spring-security-test'
	testImplementation 'org.projectlombok:lombok'
	testAnnotationProcessor 'org.projectlombok:lombok'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:3.0.3'
	testImplementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter-test:3.0.3'
	testImplementation 'com.tngtech.archunit:archunit-junit5:1.3.0'
	implementation "com.google.genai:google-genai:1.8.0"
	// A-4: thymeleaf-layout-dialect 중복 선언 제거
	implementation 'org.jsoup:jsoup:1.18.1'
	implementation 'com.google.cloud:google-cloud-vertexai:1.1.0'
	implementation 'commons-fileupload:commons-fileupload:1.5'
	implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
}

tasks.named('test') {
	useJUnitPlatform()
}

// 로컬 개발: bootRun 시 src/main/resources 를 클래스패스 앞에 둠 → CSS/HTML/JS 저장 즉시 반영
// (기본값은 build/resources/main 복사본만 사용해, 빌드 전까지 옛 파일이 서빙되는 경우가 많음)
tasks.named('bootRun', org.springframework.boot.gradle.tasks.run.BootRun) {
	sourceResources sourceSets.main
}

configurations.all {
    exclude group: 'commons-logging', module: 'commons-logging'
}
