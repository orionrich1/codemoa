<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default_layout}">

<head>
	<title th:text="${qna.title}">Q&amp;A</title>
</head>

<th:block layout:fragment="content" class="ui-view">
	<div class="container my-5">
		<div class="row justify-content-center">
			<div class="col-md-8">
				<nav class="mb-3" aria-label="breadcrumb">
					<ol class="breadcrumb mb-0">
						<li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
						<li class="breadcrumb-item"><a th:href="@{/support}">고객센터</a></li>
						<li class="breadcrumb-item"><a th:href="@{/support/qna}">Q&amp;A</a></li>
						<li class="breadcrumb-item active" aria-current="page">상세</li>
					</ol>
				</nav>

				<div th:if="${errorMsg}" class="alert alert-warning" role="alert" th:text="${errorMsg}"></div>
				<div th:if="${replyValidationFailed}" class="alert alert-danger" role="alert">답변 내용을 확인해 주세요.</div>

				<div class="card mb-4">
					<div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
						<h3 class="fs-5 mb-0" th:text="${qna.title}"></h3>
						<span th:if="${qna.isAnswered}" class="badge text-bg-success">답변완료</span>
						<span th:unless="${qna.isAnswered}" class="badge text-bg-warning text-dark">답변대기</span>
					</div>
					<div class="card-body">
						<div class="text-muted small mb-3">
							<span>작성자: <span th:text="${qna.writerNickname}"></span></span> |
							<span>작성일: <span th:text="${#temporals.format(qna.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span> |
							<span>조회수: <span th:text="${qna.viewCount}"></span></span>
						</div>
						<div class="ds-content-pre ds-block-minh-150" th:text="${qna.content}"></div>
					</div>
				</div>

				<div class="card mb-4" th:if="${!#lists.isEmpty(replyList)}">
					<div class="card-header bg-light">
						<h4 class="fs-6 mb-0">답변</h4>
					</div>
					<div class="card-body border-bottom" th:each="reply : ${replyList}">
						<div class="text-muted small mb-2">
							<span>답변자: <span th:text="${reply.writerNickname}"></span> (관리자)</span> |
							<span>답변일: <span th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span>
						</div>
						<div class="ds-content-pre" th:text="${reply.content}"></div>
					</div>
				</div>

				<div class="card mb-4" sec:authorize="hasRole('ADMIN')" th:if="${!qna.isAnswered}">
					<div class="card-header">
						<h4 class="fs-6 mb-0">답변하기</h4>
					</div>
					<div class="card-body">
						<form th:action="@{/support/qna/reply}" th:object="${qnaReply}" method="post" id="qnaReplyForm">
							<input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<input type="hidden" th:field="*{qnaId}">
							<div class="mb-3">
								<label for="replyContent" class="form-label">답변 내용</label>
								<textarea class="form-control" id="replyContent" th:field="*{content}" rows="5" required maxlength="5000" aria-required="true"></textarea>
								<p class="form-text text-muted mb-0">최대 5000자</p>
							</div>
							<button type="submit" class="btn btn-primary" id="qnaReplySubmitBtn">답변 등록</button>
						</form>
					</div>
				</div>
				<div class="mt-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
					<a th:href="@{/support/qna}" class="btn btn-secondary">목록으로</a>
					<div class="d-flex flex-wrap gap-2"
						sec:authorize="isAuthenticated()"
						th:if="${!qna.isAnswered and qna.writerId != null and #authentication.name == qna.writerId}">
						<a th:href="@{/support/qna/{id}/edit(id=${qna.qnaId})}" class="btn btn-outline-primary">수정</a>
						<button type="button" class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#deleteQnaModal" aria-label="질문 삭제">삭제</button>
					</div>
				</div>

				<div class="modal fade" id="deleteQnaModal" tabindex="-1" aria-labelledby="deleteQnaModalLabel" aria-hidden="true">
					<div class="modal-dialog">
						<div class="modal-content">
							<div class="modal-header">
								<h2 class="modal-title fs-5" id="deleteQnaModalLabel">질문을 삭제할까요?</h2>
								<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
							</div>
							<div class="modal-body">
								<p class="mb-0">삭제 후에는 복구할 수 없습니다. 답변 대기 중인 질문만 삭제할 수 있습니다.</p>
							</div>
							<div class="modal-footer">
								<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
								<form th:action="@{/support/qna/{id}/delete(id=${qna.qnaId})}" method="post" class="d-inline" id="deleteQnaForm">
									<input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<button type="submit" class="btn btn-danger" id="deleteQnaConfirmBtn" aria-label="삭제 확인">삭제</button>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
		(function () {
			var btn = document.getElementById('qnaReplySubmitBtn');
			if (btn) {
				var f = document.getElementById('qnaReplyForm');
				if (f) f.addEventListener('submit', function () { btn.disabled = true; });
			}
			var delBtn = document.getElementById('deleteQnaConfirmBtn');
			if (delBtn) {
				var df = document.getElementById('deleteQnaForm');
				if (df) df.addEventListener('submit', function () { delBtn.disabled = true; });
			}
		})();
	</script>
</th:block>
</html>
