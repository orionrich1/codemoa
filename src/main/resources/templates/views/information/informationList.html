<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	layout:decorate="~{layouts/default_layout}">
	
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>  
</head>

<div layout:fragment="content" class="ui-view">
	<main class="container my-5">
		<div class="text-center mb-4">
			<h2 class="fw-bold fs-2">강좌 추천</h2>
		</div>

		<div class="d-flex justify-content-end align-items-center mb-4">
			<div class="d-flex align-items-center gap-2">
				<form class="d-flex" role="search" id="lectureSearchForm">
					<input class="form-control ds-search-input-minw" type="search" name="keyword" placeholder="강좌명 검색" id="lectureSearch" th:value="${keyword}">
					<input type="hidden" name="type" id="type">
				</form>
				<select name="order" id="typeSelector1" class="form-select">
					<option value="recommendNo" th:selected="${order == '' or order == 'recommendNo'}">기존 순서</option>
					<option value="rating" th:selected="${order == 'rating'}">평점</option>
					<option value="regDate" th:selected="${order == 'regDate'}">등록일</option>
				</select>
				<a sec:authorize="hasRole('ADMIN')" th:href="@{/information/lectureAdd}" class="btn btn-primary flex-shrink-0">글쓰기</a>
			</div>
		</div>

		<div th:if="${#lists.isEmpty(lectureList)}" class="text-center py-5 border rounded-3 text-secondary">
			<p class="mb-3">등록된 강좌가 없습니다.</p>
			<a class="btn btn-outline-dark btn-sm" th:href="@{/information/lecture}">새로고침</a>
		</div>

		<div class="swiper mySwiper" th:unless="${#lists.isEmpty(lectureList)}">
			<div class="swiper-wrapper" id="content">
		
				<th:block th:each="lecture: ${lectureList}">
					<div class="swiper-slide">
						<div class="item-gallery-card">
							<a th:href="@{/information/lectureDetail(no=${lecture.recommendNo}, pageNum=${currentPage}, order=${order}, keyword=${keyword}, type=${type})}">
								<img th:if="${lecture.file1 != null and !lecture.file1.isEmpty()}"
									th:src="@{/files/information/{img}(img=${lecture.file1})}"
									th:alt="|강좌 썸네일: ${lecture.title}|"
									class="item-cover-image" loading="lazy" width="280" height="360">
								<div th:unless="${lecture.file1 != null and !lecture.file1.isEmpty()}" class="item-cover-image d-flex align-items-center justify-content-center bg-light text-secondary">
									<i class="bi bi-collection-play fs-1" aria-hidden="true"></i>
								</div>
								<div class="item-hover-overlay">
									<div class="item-hover-content">
										[[${lecture.subtitle}]]
									</div>
								</div>
							</a>
							<div class="item-texts">
								<strong>[[${lecture.title}]]</strong>
								<div class="metadata">
									<span><b class="fw-bold">평점:</b> [[${lecture.rating}]]</span>
									<span><b class="fw-bold">작성자:</b> [[${lecture.userId}]]</span>
								</div>
							</div>
						</div>
					</div>
				</th:block>
				
			</div>
		</div>

		<div class="row mt-5" id="Row" th:unless="${#lists.isEmpty(lectureList)}">
			<div class="col">
				<nav aria-label="페이지">
					<ul class="pagination justify-content-center flex-wrap">
						<li class="page-item" th:if="${startPage > pageGroup}">
							<a class="page-link" th:href="@{/information/lecture(pageNum=${startPage - 1}, order=${order}, keyword=${keyword}, type=${type})}">이전</a>
						</li>
						<li th:each="num : ${#numbers.sequence(startPage, endPage)}" th:classappend="${num == currentPage} ? 'active'" class="page-item">
							<a class="page-link" th:href="@{/information/lecture(pageNum=${num}, order=${order}, keyword=${keyword}, type=${type})}" th:text="${num}"></a>
						</li>
						<li class="page-item" th:if="${endPage < pageCount}">
							<a class="page-link" th:href="@{/information/lecture(pageNum=${startPage + pageGroup}, order=${order}, keyword=${keyword}, type=${type})}">다음</a>
						</li>
					</ul>
				</nav>
			</div>
		</div>
	</main>
</div>

<th:block layout:fragment="script">
	<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
	<script th:src="@{/js/information/ajax.js}"></script>
	<script th:if="${lectureList != null and !#lists.isEmpty(lectureList)}">
		const swiper = new Swiper(".mySwiper", {
			slidesPerView: 1,
			spaceBetween: 30,
			grid: {
				rows: 2,
				fill: "row",
			},
			breakpoints: {
				576: { slidesPerView: 2, grid: { rows: 2, fill: "row" } },
				768: { slidesPerView: 3, grid: { rows: 2, fill: "row" } },
				992: { slidesPerView: 4, grid: { rows: 2, fill: "row" } }
			}
		});
	</script>
</th:block>
	
</html>
