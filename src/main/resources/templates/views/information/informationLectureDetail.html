<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/default_layout}">
	
<div layout:fragment="content" class="ui-view">
	<script th:src="@{/js/information/formcheck.js}"></script>
	<form name="checkForm" id="checkForm" class="d-none" method="post">
		<input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<input type="hidden" name="no" id="no" th:value="${lecture.recommendNo}">
		<input type="hidden" name="pass" id="rPass">
		<input type="hidden" name="pageNum" th:value="${pageNum}">
		<th:block th:if="${searchOption}">
			<input type="hidden" name="type" th:value="${type}">
			<input type="hidden" name="keyword" th:value="${keyword}">
		</th:block>
	</form>

	<div class="container my-5">
		<div class="row justify-content-center">
			<div class="col-lg-9 col-xl-8">

				<nav aria-label="breadcrumb" class="mb-3">
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a th:href="@{/information}">IT 정보</a></li>
						<li class="breadcrumb-item"><a th:href="@{/information/lecture}">강좌 추천</a></li>
						<li class="breadcrumb-item active" aria-current="page">상세</li>
					</ol>
				</nav>

				<div class="ds-page-head mb-4">
					<h1 class="h2 mb-0 ds-page-title">강좌 정보</h1>
				</div>

				<div class="card shadow-sm border-0">
					<div class="card-body p-4 p-sm-5">
						
						<div class="pb-4 border-bottom">
							<h1 class="h2" th:text="${lecture.title}">게시글 제목</h1>
							<p class="lead text-secondary" th:text="${lecture.subtitle}">게시글 부제목</p>
							<div class="d-flex justify-content-between text-secondary small mt-3">
								<span>
									<strong class="fw-medium">글쓴이:</strong>
									<span th:text="${lecture.userId}"></span>
								</span>
								<span>
									<strong class="fw-medium">작성일:</strong>
									<span>[[${#dates.format(lecture.regDate, 'yyyy-MM-dd HH:mm')}]]</span>
								</span>
							</div>
							<div class="d-flex justify-content-between text-secondary small mt-2">
								<span>
									<strong class="fw-medium">카테고리:</strong>
									<span th:text="${lecture.category}"></span>
								</span>
								<span>
									<strong class="fw-medium">별점:</strong>
									<span th:text="${lecture.rating}"></span>
								</span>
							</div>
							<div class="mt-2" th:if="${lecture.lectureSource != null and !lecture.lectureSource.isEmpty()}">
								<a class="small" th:href="${lecture.lectureSource}" target="_blank" rel="noopener noreferrer">강의·신청 링크 열기</a>
							</div>
						</div>

						<div class="py-4 my-3">
							<h2 class="h5 mb-3">이런 걸 배울 수 있어요</h2>
							<p class="mt-3 ds-content-pre" th:text="${lecture.content1}"></p>
							<p class="ds-content-pre" th:text="${lecture.content2}"></p>
						</div>

						<div class="py-4 border-top text-center">
							<th:block th:if="${lecture.file1}">
								<img th:src="@{/files/information/{img}(img=${lecture.file1})}" th:alt="|강좌 썸네일: ${lecture.title}|" class="img-fluid rounded">
							</th:block>
							<th:block th:unless="${lecture.file1}">
								<p class="text-secondary">업로드 된 이미지가 없습니다.</p>
							</th:block>
						</div>

						<div class="p-3 bg-light rounded mt-4">
							<div class="d-flex justify-content-between align-items-center">
								<div class="flex-grow-1 me-3">
									<input class="form-control" type="password" name="pass" id="pass" placeholder="수정 또는 삭제를 위해 비밀번호를 입력하세요.">
								</div>
								<div class="flex-shrink-0">
									<button class="btn btn-warning" type="button" id="detailUpdate">수정</button>
									<button class="btn btn-danger"  type="button" id="lectureDetailDelete">삭제</button>
								</div>
							</div>
						</div>

					</div>
				</div>

				<section th:if="${relatedLectures != null and !#lists.isEmpty(relatedLectures)}" class="mt-5" aria-labelledby="related-lectures">
					<h3 id="related-lectures" class="h5 fw-normal mb-3">같은 카테고리 강좌</h3>
					<ul class="list-group list-group-flush border rounded-3">
						<li th:each="rel : ${relatedLectures}" class="list-group-item d-flex justify-content-between align-items-center">
							<a th:href="@{/information/lectureDetail(no=${rel.recommendNo}, pageNum=1)}" th:text="${rel.title}">제목</a>
							<span class="text-secondary small" th:text="${rel.rating}">별점</span>
						</li>
					</ul>
				</section>

				<div class="row mt-4">
					<div class="col text-center">
						<a class="btn btn-secondary px-5" th:href="@{/information/lecture(pageNum=${pageNum}, order=${order}, keyword=${keyword}, type=${type})}">목록</a>
					</div>
				</div>

			</div>
		</div>
	</div>

	<div class="modal fade" id="lectureDeleteModal" tabindex="-1" aria-labelledby="lectureDeleteModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="lectureDeleteModalLabel">강좌 글 삭제</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
				</div>
				<div class="modal-body">정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
					<button type="button" class="btn btn-danger" id="confirmLectureDelete" aria-label="삭제 확인">삭제</button>
				</div>
			</div>
		</div>
	</div>
</div>
</html>
