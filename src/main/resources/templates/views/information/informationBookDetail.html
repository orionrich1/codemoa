<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/default_layout}">
	
<div layout:fragment="content" class="ui-view">
	<script th:src="@{/js/information/formcheck.js}"></script>
	<form name="checkForm" id="checkForm" class="d-none" method="post">
		<input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<input type="hidden" name="no" id="no" th:value="${book.bookNo}">
		<input type="hidden" name="pass" id="rPass">
		<input type="hidden" name="pageNum" th:value="${pageNum}">
		<th:block th:if="${searchOption}">
			<input type="hidden" name="type" th:value="${type}">
			<input type="hidden" name="keyword" th:value="${keyword}">
		</th:block>
	</form>

	<div class="container my-5">
		<div class="row justify-content-center">
			<div class="col-lg-9 col-xl-8">

				<nav aria-label="breadcrumb" class="mb-3">
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a th:href="@{/information}">IT 정보</a></li>
						<li class="breadcrumb-item"><a th:href="@{/information/book}">도서 추천</a></li>
						<li class="breadcrumb-item active" aria-current="page">상세</li>
					</ol>
				</nav>

				<div class="text-center mb-4">
					<h2 class="fw-bold fs-2">IT 도서 정보</h2>
				</div>

				<div class="card shadow-sm border-0">
					<div class="card-body p-4 p-sm-5">
						
						<div class="pb-4 border-bottom">
							<h1 class="h2 mb-3" th:text="${book.title}">게시글 제목</h1>
							<div class="d-flex justify-content-between text-secondary small">
								<span>
									<b class="fw-bold">글쓴이:</b>
									<span th:text="${book.userId}"></span>
								</span>
								<span>
									<b class="fw-bold">작성일:</b>
									<span>[[${#dates.format(book.regDate, 'yyyy-MM-dd HH:mm')}]]</span>
								</span>
							</div>
							<div class="d-flex justify-content-between text-secondary small mt-2">
								<span>
									<b class="fw-bold">출판사:</b>
									<span th:text="${book.publisher}"></span>
								</span>
								<span>
									<b class="fw-bold">출판일:</b>
									<span th:text="${book.pubDate != null ? #dates.format(book.pubDate, 'yyyy-MM-dd') : '-'}"></span>
								</span>
							</div>
							<div class="mt-2" th:if="${book.bookSource != null and !book.bookSource.isEmpty()}">
								<a class="small" th:href="${book.bookSource}" target="_blank" rel="noopener noreferrer">도서·구매 링크 열기</a>
							</div>
						</div>

						<div class="py-4 my-3 ds-block-minh-150">
							<p class="ds-content-pre" th:text="${book.content}"></p>
						</div>

						<div class="py-4 border-top text-center">
							<th:block th:if="${book.file1}">
								<img th:src="@{/files/information/{img}(img=${book.file1})}" th:alt="|도서 표지: ${book.title}|" class="img-fluid rounded">
							</th:block>
							<th:block th:unless="${book.file1}">
								<p class="text-secondary">업로드 된 이미지가 없습니다.</p>
							</th:block>
						</div>

						<div class="p-3 bg-light rounded mt-4">
							<div class="d-flex justify-content-between align-items-center">
								<div class="flex-grow-1 me-3">
									<input class="form-control" type="password" name="pass" id="pass" placeholder="수정 또는 삭제를 위해 비밀번호를 입력하세요.">
								</div>
								<div class="flex-shrink-0">
									<button class="btn btn-warning" type="button" id="bookDetailUpdate">수정</button>
									<button class="btn btn-danger"  type="button" id="bookDetailDelete">삭제</button>
								</div>
							</div>
						</div>

					</div>
				</div>

				<section th:if="${relatedBooks != null and !#lists.isEmpty(relatedBooks)}" class="mt-5" aria-labelledby="related-books">
					<h3 id="related-books" class="h5 fw-normal mb-3">다른 도서</h3>
					<ul class="list-group list-group-flush border rounded-3">
						<li th:each="rel : ${relatedBooks}" class="list-group-item d-flex justify-content-between align-items-center">
							<a th:href="@{/information/bookDetail(no=${rel.bookNo}, pageNum=1)}" th:text="${rel.title}">제목</a>
							<span class="text-secondary small" th:text="${rel.publisher}">출판사</span>
						</li>
					</ul>
				</section>

				<div class="row mt-4">
					<div class="col text-center">
						<a class="btn btn-secondary px-5" th:href="@{/information/book(pageNum=${pageNum}, order=${order}, keyword=${keyword}, type=${type})}">목록</a>
					</div>
				</div>

			</div>
		</div>
	</div>

	<div class="modal fade" id="bookDeleteModal" tabindex="-1" aria-labelledby="bookDeleteModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="bookDeleteModalLabel">도서 글 삭제</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
				</div>
				<div class="modal-body">정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
					<button type="button" class="btn btn-danger" id="confirmBookDelete" aria-label="삭제 확인">삭제</button>
				</div>
			</div>
		</div>
	</div>
</div>
</html>
