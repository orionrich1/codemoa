<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">

<th:block layout:fragment="extra-head">
    <link rel="stylesheet" th:href="@{/css/problem.css}" />
</th:block>

<div layout:fragment="content" class="ui-view ai-page">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">

                <!-- 페이지 헤더 (다른 AI 페이지와 동일한 계층구조) -->
                <div class="ds-page-head mb-5">
                    <p class="ai-page__kicker mb-2">AI Assistant</p>
                    <h2 class="ai-page__title mb-0">AI에게 질문하기</h2>
                </div>

                <!-- 질문 입력 카드 -->
                <div class="card ai-card mb-3">
                    <div class="card-body ai-card__body">
                        <form id="questionForm">
                            <label for="questionText" class="form-label fw-semibold mb-2">질문 입력</label>
                            <textarea class="form-control ds-textarea-code" rows="6" id="questionText"
                                      placeholder="궁금한 점을 여기에 입력하세요..."></textarea>
                            <div class="d-flex justify-content-end mt-3">
                                <button type="submit" class="btn btn-primary home-ds-cta-primary">
                                    <i class="bi bi-send-fill me-2" aria-hidden="true"></i>답변 생성하기
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- AI 답변 카드 -->
                <div class="card ai-card">
                    <div class="card-body ai-card__body">
                        <p class="ai-page__kicker mb-3">
                            <i class="bi bi-robot me-1" aria-hidden="true"></i>AI 답변
                        </p>

                        <!-- 빈 상태 (초기, 답변 도착 전) -->
                        <div id="aiAnswerEmpty" class="ui-empty-state text-center py-5 rounded-3">
                            <i class="bi bi-chat-square-dots fs-1 d-block mb-2" aria-hidden="true"></i>
                            <p class="mb-0">무엇이든 질문해주세요.</p>
                        </div>

                        <!-- 답변 결과 (JS 로 채움, 초기 숨김) -->
                        <div class="code-block d-none" id="aiAnswerBlock"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script th:src="@{/js/problem.js}"></script>
</div>
</html>
