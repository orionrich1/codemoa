<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>AI 코딩 · 문제 작성</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/problem.css}" />
    </th:block>
</head>
<body>
<div layout:fragment="content" class="ui-view ai-page">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-xl-11 col-lg-12">

                <div class="ds-page-head mb-4">
                    <p class="ai-page__kicker mb-2">AI Coding</p>
                    <h2 class="ai-page__title mb-0">문제 작성</h2>
                </div>

                <div class="row g-4">
                    <!-- 입력 폼 -->
                    <div class="col-lg-6">
                        <div class="card ai-card">
                            <div class="card-body ai-card__body">
                                <form method="post" th:action="@{problemWrite}" id="writeForm" class="d-flex flex-column gap-3">

                                    <!-- 제목 -->
                                    <div>
                                        <label for="title" class="form-label fw-semibold">문제 제목 <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="title" id="title"
                                               placeholder="문제 제목을 입력하세요" autocomplete="off">
                                    </div>

                                    <!-- 언어 + 난이도 -->
                                    <div class="row g-3">
                                        <div class="col-sm-6">
                                            <label for="category" class="form-label fw-semibold">프로그래밍 언어 <span class="text-danger">*</span></label>
                                            <select class="form-select" name="category" id="category">
                                                <option value="" disabled selected>언어 선택</option>
                                                <option value="JAVA">JAVA</option>
                                                <option value="JavaScript">JavaScript</option>
                                                <option value="Python">Python</option>
                                                <option value="Kotlin">Kotlin</option>
                                            </select>
                                        </div>
                                        <div class="col-sm-6">
                                            <label for="difficulty" class="form-label fw-semibold">난이도 <span class="text-danger">*</span></label>
                                            <select class="form-select" name="difficulty" id="difficulty">
                                                <option value="하" selected>하</option>
                                                <option value="중">중</option>
                                                <option value="상">상</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- 문제 내용 -->
                                    <div>
                                        <label for="content" class="form-label fw-semibold">문제 내용 <span class="text-danger">*</span></label>
                                        <textarea class="form-control useTabkey ds-textarea-code" name="content" id="content"
                                                  rows="10" placeholder="문제 내용을 입력하세요. Tab 키로 들여쓰기(4칸)할 수 있습니다."></textarea>
                                    </div>

                                    <!-- 힌트 -->
                                    <div>
                                        <label for="hint" class="form-label fw-semibold">
                                            문제 힌트 <span class="text-secondary fw-normal">(선택)</span>
                                        </label>
                                        <textarea class="form-control useTabkey ds-textarea-code" name="hint" id="hint"
                                                  rows="4" placeholder="힌트가 없으면 비워두세요."></textarea>
                                    </div>

                                    <!-- 모범 답안 -->
                                    <div>
                                        <label for="answer" class="form-label fw-semibold">모범 답안 <span class="text-danger">*</span></label>
                                        <textarea class="form-control useTabkey ds-textarea-code" name="answer" id="answer"
                                                  rows="10" placeholder="모범 답안 코드를 입력하세요. Tab 키로 들여쓰기(4칸)할 수 있습니다."></textarea>
                                    </div>

                                    <!-- 버튼 -->
                                    <div class="d-flex gap-2 justify-content-end pt-2 border-top">
                                        <button type="button" class="btn btn-outline-secondary" onclick="history.back()">
                                            취소
                                        </button>
                                        <button type="submit" class="btn btn-primary home-ds-cta-primary">
                                            <i class="bi bi-check-lg me-1" aria-hidden="true"></i>작성 완료
                                        </button>
                                    </div>

                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- 실시간 미리보기 패널 -->
                    <div class="col-lg-6 d-none d-lg-block" id="previewPanel">
                        <div class="card ai-card h-100">
                            <div class="card-body ai-card__body">
                                <p class="ai-page__kicker mb-2">미리보기</p>
                                <h4 class="ai-page__title mb-1" id="previewTitle">제목을 입력하면 여기에 표시됩니다</h4>
                                <div class="d-flex gap-2 mb-3" id="previewMeta">
                                    <span class="badge text-bg-dark" id="previewCategory">언어</span>
                                    <span class="badge bg-secondary" id="previewDifficulty">난이도</span>
                                </div>
                                <p class="fw-medium mb-1">문제 내용</p>
                                <pre class="ai-code" id="previewContent">내용을 입력하면 여기에 표시됩니다</pre>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script th:src="@{/js/problem.js}"></script>
    <script>
    /* 실시간 미리보기 (기능 9) */
    (function () {
        function syncPreview() {
            document.getElementById('previewTitle').textContent =
                document.getElementById('title').value || '제목을 입력하면 여기에 표시됩니다';
            document.getElementById('previewContent').textContent =
                document.getElementById('content').value || '내용을 입력하면 여기에 표시됩니다';
            const cat = document.getElementById('category').value;
            const diff = document.getElementById('difficulty').value;
            document.getElementById('previewCategory').textContent = cat || '언어';
            document.getElementById('previewDifficulty').textContent = diff || '난이도';
        }
        ['title', 'content', 'category', 'difficulty'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', syncPreview);
        });
        document.getElementById('category').addEventListener('change', syncPreview);
        document.getElementById('difficulty').addEventListener('change', syncPreview);
    })();
    </script>
</div>
</body>
</html>
