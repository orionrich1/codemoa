<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>AI 코딩 · 문제 수정</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/problem.css}" />
    </th:block>
</head>
<body>
<div layout:fragment="content" class="ui-view ai-page">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="ds-page-head mb-4">
                    <p class="ai-page__kicker mb-2">AI Coding</p>
                    <h2 class="ai-page__title mb-0">문제 수정</h2>
                </div>

                <div class="card ai-card">
                    <div class="card-body ai-card__body">
                        <form method="post" th:action="@{problemUpdate}" id="updateForm" class="d-flex flex-column gap-3">
                            <input type="hidden" name="problemId" th:value="${problem.problemId}">

                            <!-- 제목 -->
                            <div>
                                <label for="title" class="form-label fw-semibold">문제 제목 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="title" id="title"
                                       th:value="${problem.title}" autocomplete="off">
                            </div>

                            <!-- 언어 + 난이도 -->
                            <div class="row g-3">
                                <div class="col-sm-6">
                                    <label for="category" class="form-label fw-semibold">프로그래밍 언어 <span class="text-danger">*</span></label>
                                    <select class="form-select" name="category" id="category">
                                        <option value="JAVA"       th:selected="${problem.category == 'JAVA'}">JAVA</option>
                                        <option value="JavaScript" th:selected="${problem.category == 'JavaScript'}">JavaScript</option>
                                        <option value="Python"     th:selected="${problem.category == 'Python'}">Python</option>
                                        <option value="Kotlin"     th:selected="${problem.category == 'Kotlin'}">Kotlin</option>
                                    </select>
                                </div>
                                <div class="col-sm-6">
                                    <label for="difficulty" class="form-label fw-semibold">난이도 <span class="text-danger">*</span></label>
                                    <select class="form-select" name="difficulty" id="difficulty">
                                        <option value="하" th:selected="${problem.difficulty == '하'}">하</option>
                                        <option value="중" th:selected="${problem.difficulty == '중'}">중</option>
                                        <option value="상" th:selected="${problem.difficulty == '상'}">상</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 문제 내용 -->
                            <div>
                                <label for="content" class="form-label fw-semibold">문제 내용 <span class="text-danger">*</span></label>
                                <textarea class="form-control useTabkey ds-textarea-code" name="content" id="content"
                                          rows="10" th:text="${problem.content}"></textarea>
                            </div>

                            <!-- 힌트 -->
                            <div>
                                <label for="hint" class="form-label fw-semibold">
                                    문제 힌트 <span class="text-secondary fw-normal">(선택)</span>
                                </label>
                                <textarea class="form-control useTabkey ds-textarea-code" name="hint" id="hint"
                                          rows="4" th:text="${problem.hint}"
                                          placeholder="힌트가 없으면 비워두세요."></textarea>
                            </div>

                            <!-- 모범 답안 -->
                            <div>
                                <label for="answer" class="form-label fw-semibold">모범 답안 <span class="text-danger">*</span></label>
                                <textarea class="form-control useTabkey ds-textarea-code" name="answer" id="answer"
                                          rows="10" th:text="${problem.answer}"></textarea>
                            </div>

                            <!-- 버튼 -->
                            <div class="d-flex gap-2 justify-content-end pt-2 border-top">
                                <button type="button" class="btn btn-outline-secondary" onclick="history.back()">
                                    취소
                                </button>
                                <button type="submit" class="btn btn-primary home-ds-cta-primary">
                                    <i class="bi bi-check-lg me-1" aria-hidden="true"></i>수정 완료
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script th:src="@{/js/problem.js}"></script>
</div>
</body>
</html>
