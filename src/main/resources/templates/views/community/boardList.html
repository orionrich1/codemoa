<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title th:text="${categoryName} + ' · 커뮤니티'">커뮤니티</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/community.css}" />
    </th:block>
</head>
<body>
<div layout:fragment="content" class="ui-view community-ds community-ui">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav class="mb-3" aria-label="breadcrumb">
                    <ol class="breadcrumb community-breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/community/free}">커뮤니티</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${categoryName}">게시판</li>
                    </ol>
                </nav>
                <div class="text-center mb-4">
                    <p class="community-page__kicker mb-0">Community</p>
                    <h1 class="community-page__title mb-0" th:text="${categoryName}">게시판</h1>
                </div>
                <article class="community-card">
                    <div class="community-card__body">
                        <form th:action="@{/community/{category}(category=${category})}" method="get" class="community-toolbar mb-4">
                            <input type="hidden" name="page" value="0">
                            <div class="row g-2 align-items-end">
                                <div class="col-12 col-md-3 col-lg-2">
                                    <label for="sortSelect" class="form-label small text-muted mb-1">정렬</label>
                                    <select name="sort" id="sortSelect" class="form-select form-select-sm" onchange="this.form.submit()">
                                        <option value="board" th:selected="${sort == 'board'}">글번호순</option>
                                        <option value="recent" th:selected="${sort == 'recent'}">최신순(작성일)</option>
                                        <option value="comments" th:selected="${sort == 'comments'}">댓글 많은 순</option>
                                        <option value="recommend" th:selected="${sort == 'recommend'}">추천순</option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-3 col-lg-2">
                                    <label for="searchTypeSel" class="form-label small text-muted mb-1">검색 범위</label>
                                    <select name="searchType" id="searchTypeSel" class="form-select form-select-sm">
                                        <option value="title_content" th:selected="${searchType == 'title_content'}">제목+내용</option>
                                        <option value="title" th:selected="${searchType == 'title'}">제목</option>
                                        <option value="content" th:selected="${searchType == 'content'}">내용</option>
                                        <option value="author" th:selected="${searchType == 'author'}">작성자</option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-4 col-lg-5">
                                    <label for="keywordInp" class="form-label small text-muted mb-1">검색어</label>
                                    <input type="text" name="keyword" id="keywordInp" class="form-control form-control-sm" th:value="${keyword}" placeholder="검색어를 입력하세요" autocomplete="off">
                                </div>
                                <div class="col-12 col-md-2 col-lg-3 d-flex gap-2">
                                    <button type="submit" class="community-ds-cta-primary flex-grow-1">검색</button>
                                    <a th:href="@{/community/{category}/write(category=${category})}" class="community-ds-cta-primary text-center text-decoration-none d-inline-flex align-items-center justify-content-center flex-grow-1">
                                        <i class="bi bi-pencil-square me-1" aria-hidden="true"></i>글쓰기
                                    </a>
                                </div>
                            </div>
                        </form>

                        <div class="community-table-wrap">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle responsive-table community-table mb-0">
                                <thead>
                                    <tr>
                                        <th class="text-center d-none d-md-table-cell ds-table-col-10">번호</th>
                                        <th class="text-center ds-table-col-15">카테고리</th>
                                        <th>제목</th>
                                        <th class="text-center ds-table-col-15">작성자</th>
                                        <th class="text-center d-none d-md-table-cell ds-table-col-15">작성일</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="board : ${boards.content}"
                                        class="community-table__row"
                                        tabindex="0"
                                        role="link"
                                        th:attr="data-href=@{/community/{cat}/{boardNo}(cat=${board.categoryUrlSegment}, boardNo=${board.boardNo})}">
                                        <td class="td-no text-center d-none d-md-table-cell" th:text="${board.boardNo}">1</td>
                                        <td class="td-category text-center">
                                            <span class="community-ds-chip" th:text="${board.category}">Java</span>
                                        </td>
                                        <td class="td-title">
                                            <a class="community-table__title-link" th:href="@{/community/{cat}/{boardNo}(cat=${board.categoryUrlSegment}, boardNo=${board.boardNo})}">
                                                [[${board.title}]]
                                            </a>
                                            <span class="community-ds-chip community-ds-chip--dark ms-2" th:if="${board.stakedPoints > 0}" th:text="|${board.stakedPoints}P|"></span>
                                        </td>
                                        <td class="td-author text-center">
                                            <div class="d-flex justify-content-center position-relative">
                                                <div th:replace="~{fragments/_userProfile :: userProfile(nickname=${board.authorNickname}, iconName=${board.authorGradeIconName})}"></div>
                                            </div>
                                        </td>
                                        <td class="td-date text-center d-none d-md-table-cell community-caption" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}">2025-07-28</td>
                                    </tr>
                                    <tr th:if="${boards.empty}">
                                        <td colspan="5" class="community-empty py-5">
                                            <p class="mb-3">조회된 게시글이 없습니다.</p>
                                            <a th:href="@{/community/{category}/write(category=${category})}" class="community-ds-cta-primary text-decoration-none d-inline-flex align-items-center gap-2">
                                                <i class="bi bi-pencil-square" aria-hidden="true"></i>첫 글 작성하기
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                                </table>
                            </div>
                        </div>
                        <div th:if="${!boards.empty}" class="mt-4">
                            <nav class="community-pagination" aria-label="페이지 네비게이션">
                                <ul class="pagination justify-content-center mb-0 flex-wrap">
                                    <li class="page-item" th:classappend="${startPage == 1} ? 'disabled'"><a class="page-link" th:href="@{/community/{category}(category=${category}, page=${startPage - 2}, searchType=${searchType}, keyword=${keyword}, sort=${sort})}">이전</a></li>
                                    <li class="page-item" th:each="page: ${#numbers.sequence(startPage, endPage)}" th:classappend="${page == nowPage} ? 'active'"><a class="page-link" th:text="${page}" th:href="@{/community/{category}(category=${category}, page=${page - 1}, searchType=${searchType}, keyword=${keyword}, sort=${sort})}"></a></li>
                                    <li class="page-item" th:classappend="${endPage >= boards.totalPages} ? 'disabled'"><a class="page-link" th:href="@{/community/{category}(category=${category}, page=${endPage}, searchType=${searchType}, keyword=${keyword}, sort=${sort})}">다음</a></li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="script">
    <script>
        document.querySelectorAll('.community-table__row[data-href]').forEach(function (row) {
            row.addEventListener('click', function (e) {
                if (e.target.closest('a')) return;
                var href = row.getAttribute('data-href');
                if (href) window.location.href = href;
            });
            row.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    var href = row.getAttribute('data-href');
                    if (href) window.location.href = href;
                }
            });
        });
    </script>
</th:block>
</body>
</html>
