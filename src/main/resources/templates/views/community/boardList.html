<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/default_layout}">
<head>
    <title th:text="${categoryName} + ' · 커뮤니티'">커뮤니티</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/community.css}" />
    </th:block>
</head>
<body>
<div layout:fragment="content" class="ui-view community-ds community-ui">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="text-center mb-4">
                    <p class="community-page__kicker mb-0">Community</p>
                    <h1 class="community-page__title mb-0" th:text="${categoryName}">게시판</h1>
                </div>
                <article class="community-card">
                    <div class="community-card__body">
                        <div class="d-flex justify-content-end mb-3">
                            <a th:href="@{/community/{category}/write(category=${category})}" class="community-ds-cta-primary">
                                <i class="bi bi-pencil-square me-2" aria-hidden="true"></i>글쓰기
                            </a>
                        </div>
                        <div class="community-table-wrap">
                            <table class="table table-hover align-middle responsive-table community-table mb-0">
                                <thead>
                                    <tr>
                                        <th class="text-center d-none d-md-table-cell ds-table-col-10">번호</th>
                                        <th class="text-center ds-table-col-15">카테고리</th>
                                        <th>제목</th>
                                        <th class="text-center ds-table-col-15">작성자</th>
                                        <th class="text-center d-none d-md-table-cell ds-table-col-15">작성일</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="board : ${boards.content}">
                                        <td class="td-no text-center d-none d-md-table-cell" th:text="${board.boardNo}">1</td>
                                        <td class="td-category text-center">
                                            <span class="community-ds-chip" th:text="${board.category}">Java</span>
                                        </td>
                                        <td class="td-title">
                                            <a class="community-table__title-link" th:href="@{/community/{category}/{boardNo}(category=${board.category}, boardNo=${board.boardNo})}">
                                                [[${board.title}]]
                                            </a>
                                            <span class="community-ds-chip community-ds-chip--dark ms-2" th:if="${board.stakedPoints > 0}" th:text="|${board.stakedPoints}P|"></span>
                                        </td>
                                        <td class="td-author text-center">
                                            <div class="d-flex justify-content-center">
                                                <div th:replace="~{fragments/_userProfile :: userProfile(nickname=${board.authorNickname}, iconName=${board.authorGradeIconName})}"></div>
                                            </div>
                                        </td>
                                        <td class="td-date text-center d-none d-md-table-cell community-caption" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}">2025-07-28</td>
                                    </tr>
                                    <tr th:if="${boards.empty}">
                                        <td colspan="5" class="community-empty">조회된 게시글이 없습니다.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div th:if="${!boards.empty}" class="mt-4">
                            <nav class="community-pagination" aria-label="페이지 네비게이션">
                                <ul class="pagination justify-content-center mb-0 flex-wrap">
                                    <li class="page-item" th:classappend="${startPage == 1} ? 'disabled'"><a class="page-link" th:href="@{/community/{category}(category=${category}, page=${startPage - 2}, searchType=${searchType}, keyword=${keyword})}">이전</a></li>
                                    <li class="page-item" th:each="page: ${#numbers.sequence(startPage, endPage)}" th:classappend="${page == nowPage} ? 'active'"><a class="page-link" th:text="${page}" th:href="@{/community/{category}(category=${category}, page=${page - 1}, searchType=${searchType}, keyword=${keyword})}"></a></li>
                                    <li class="page-item" th:classappend="${endPage >= boards.totalPages} ? 'disabled'"><a class="page-link" th:href="@{/community/{category}(category=${category}, page=${endPage}, searchType=${searchType}, keyword=${keyword})}">다음</a></li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                    <div class="community-card__footer community-card__footer--inset">
                        <form th:action="@{/community/{category}(category=${category})}" method="get" class="d-flex justify-content-center flex-wrap gap-2 align-items-stretch">
                            <div class="ds-filter-w-150">
                                <select name="searchType" class="form-select">
                                    <option value="title_content" th:selected="${searchType == 'title_content'}">제목+내용</option>
                                    <option value="title" th:selected="${searchType == 'title'}">제목</option>
                                    <option value="content" th:selected="${searchType == 'content'}">내용</option>
                                    <option value="author" th:selected="${searchType == 'author'}">작성자</option>
                                </select>
                            </div>
                            <div class="ds-flex-minw-200">
                                <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="검색어를 입력하세요">
                            </div>
                            <div class="d-flex align-items-stretch">
                                <button type="submit" class="community-ds-cta-primary w-100">검색</button>
                            </div>
                        </form>
                    </div>
                </article>
            </div>
        </div>
    </div>
</div>
</body>
</html>
