<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/default_layout}">
<head>
    <title th:text="${board.title} + ' · 커뮤니티'">게시글</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/community.css}" />
    </th:block>
</head>
<body>
<div layout:fragment="content" class="ui-view community-ds community-ui">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <article class="community-card mb-4">
                    <div class="community-card__body community-card__body--spacious">
                        <header class="border-bottom pb-3 mb-4 ds-border-bottom-subtle">
                            <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                                <h1 class="community-post__title mb-0" th:text="${board.title}">게시글 제목</h1>
                                <span class="community-ds-chip community-ds-chip--dark" th:if="${board.stakedPoints > 0}" th:text="|${board.stakedPoints}P|"></span>
                            </div>
                            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
                                <div class="d-flex align-items-center flex-wrap ds-gap-16">
                                    <div th:replace="~{fragments/_userProfile :: userProfile(nickname=${board.authorNickname}, iconName=${board.authorGradeIconName})}"></div>
                                    <span class="community-caption mb-0" th:text="'작성일 ' + ${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                                </div>
                                <span class="community-ds-chip" th:text="${board.category}">카테고리</span>
                            </div>
                        </header>

                        <div class="community-post-body py-4 ds-post-body-minh" th:utext="${board.content}">
                            본문 내용
                        </div>
                    </div>
                    <div class="community-card__footer community-card__footer--inset d-flex flex-wrap justify-content-end align-items-center gap-2">
                        <div th:if="${#authentication.name == board.authorId}" class="d-flex flex-wrap gap-2">
                            <a th:href="@{/boards/{boardNo}/edit(boardNo=${board.boardNo})}" class="community-ds-cta-ghost">수정</a>
                            <button type="button" id="delete-btn" class="community-ds-cta-danger border-0">삭제</button>
                        </div>
                        <a th:href="@{/community/{category}(category=${board.category})}" class="community-ds-cta-primary">
                            <i class="bi bi-list-ul" aria-hidden="true"></i> 목록으로
                        </a>
                    </div>
                </article>

                <article class="community-card mb-4">
                    <div class="community-card__header d-flex align-items-center gap-2">
                        <h2 class="community-card__heading mb-0">
                            <i class="bi bi-chat-dots-fill me-2" aria-hidden="true"></i>댓글 <span th:text="${#lists.size(board.comments)}">0</span>개
                        </h2>
                    </div>
                    <div class="community-card__body">
                        <div th:if="${#lists.isEmpty(board.comments)}" class="community-empty py-4">등록된 댓글이 없습니다.</div>
                        <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(board.comments)}">
                            <li class="list-group-item community-comment-item" th:each="comment : ${board.comments}">
                                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                                    <div class="d-flex align-items-center flex-wrap ds-gap-12">
                                        <div th:replace="~{fragments/_userProfile :: userProfile(nickname=${comment.authorNickname}, iconName=${comment.authorGradeIconName})}"></div>
                                        <small class="community-caption mb-0" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                                    </div>
                                    <span th:if="${comment.isAdopted}" class="community-ds-chip community-ds-chip--dark">채택됨</span>
                                </div>
                                <p class="community-comment-body mt-2 mb-0" th:text="${comment.content}">댓글 내용입니다.</p>
                                <div class="text-end mt-2" th:if="${board.stakedPoints > 0 and !board.isResolved and !comment.isAdopted and #authentication.name == board.authorId}">
                                    <button type="button" th:attr="data-comment-no=${comment.commentNo}" class="community-ds-cta-warm community-ds-cta-sm adopt-btn border-0">
                                        <i class="bi bi-check-circle" aria-hidden="true"></i> 채택
                                    </button>
                                </div>
                            </li>
                        </ul>
                    </div>
                </article>

                <article class="community-card" th:if="${!board.isResolved}">
                    <div class="community-card__body community-card__body--spacious">
                        <form id="commentForm">
                            <div class="mb-3">
                                <label class="form-label" for="commentContent">댓글 작성</label>
                                <textarea class="form-control" id="commentContent" rows="3" placeholder="댓글을 입력하세요" required></textarea>
                            </div>
                            <div class="text-end">
                                <button type="submit" class="community-ds-cta-primary border-0">
                                    <i class="bi bi-pencil-square" aria-hidden="true"></i> 등록
                                </button>
                            </div>
                        </form>
                    </div>
                </article>
            </div>
        </div>
    </div>
</div>
    
<th:block layout:fragment="script">
    <script th:inline="javascript">
        const token = document.querySelector("meta[name='_csrf']")?.content;
        const header = document.querySelector("meta[name='_csrf_header']")?.content;
        const headers = { 'Content-Type': 'application/json' };
        if (token && header) {
            headers[header] = token;
        }

        const deleteBtn = document.getElementById('delete-btn');
        if (deleteBtn) {
            deleteBtn.addEventListener('click', function () {
                if (!confirm('정말로 삭제하시겠습니까?')) {
                    return;
                }
                const boardNo = /*[[${board.boardNo}]]*/ 0;
                const category = /*[[${board.category}]]*/ 'free';

                fetch(`/api/boards/${boardNo}`, {
                    method: 'DELETE',
                    headers: headers
                }).then(response => {
                    if (response.ok) {
                        alert('게시글이 삭제되었습니다.');
                        location.href = '/community/' + category;
                    } else {
                        alert('삭제에 실패했습니다. 권한을 확인해주세요.');
                    }
                }).catch(error => console.error('Error:', error));
            });
        }

        const commentForm = document.getElementById('commentForm');
        if(commentForm) {
            commentForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const boardNo = /*[[${board.boardNo}]]*/ 0;
                const content = document.getElementById('commentContent').value;

                if (!content || content.trim() === "") {
                    alert("댓글 내용을 입력해주세요.");
                    return;
                }
                const data = { content: content };
                fetch(`/api/boards/${boardNo}/comments`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                })
                .then(response => {
                    if (response.ok) {
                        alert("댓글이 성공적으로 등록되었습니다.");
                        location.reload();
                    } else {
                        alert("댓글 등록에 실패했습니다.");
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("오류가 발생했습니다.");
                });
            });
        }
        
        document.querySelectorAll('.adopt-btn').forEach(button => {
            button.addEventListener('click', function() {
                const commentNo = this.dataset.commentNo;
                if (confirm("이 답변을 채택하시겠습니까? 채택 후에는 변경할 수 없습니다.")) {
                    fetch(`/api/comments/${commentNo}/adopt`, {
                        method: 'POST',
                        headers: headers
                    })
                    .then(response => {
                        if (response.ok) {
                            alert("답변이 채택되었습니다.");
                            location.reload();
                        } else {
                            response.text().then(text => {
                                alert("채택 실패: " + text);
                            });
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert("채택 중 오류가 발생했습니다.");
                    });
                }
            });
        });
    </script>
</th:block>
</body>
</html>
