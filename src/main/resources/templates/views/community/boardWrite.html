<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>커뮤니티 · 새 글 작성</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/community.css}" />
        <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    </th:block>
</head>
<body>
<div layout:fragment="content" class="ui-view community-ds community-ui">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <nav class="mb-3" aria-label="breadcrumb">
                    <ol class="breadcrumb community-breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/community/free}">커뮤니티</a></li>
                        <li class="breadcrumb-item">
                            <a th:href="@{/community/{seg}(seg=${listUrlSegment})}" th:text="${boardListTitle}">게시판</a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page">새 글 작성</li>
                    </ol>
                </nav>
                <div id="communityToast" class="community-toast alert d-none" role="alert" aria-live="polite"></div>
                <p id="writeFormError" class="text-danger small mt-2 d-none" role="alert"></p>
                <div class="text-center mb-4">
                    <p class="community-page__kicker mb-0">Community</p>
                    <h1 class="community-page__title mb-0">새 글 작성</h1>
                    <p class="community-caption mb-0 mt-1" th:text="${boardListTitle}">게시판</p>
                </div>

                <article class="community-card">
                    <div class="community-card__body community-card__body--spacious">
                        <form id="writeForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="category" class="form-label">카테고리</label> 
                                    <select class="form-select" id="category" name="category" required>
                                        <option value="" disabled th:selected="${selectedCategory == null}">카테고리를 선택하세요</option>
                                        <option value="Java"       th:selected="${#strings.equalsIgnoreCase(selectedCategory, 'Java')}">Java</option>
                                        <option value="Python"     th:selected="${#strings.equalsIgnoreCase(selectedCategory, 'Python')}">Python</option>
                                        <option value="JavaScript" th:selected="${#strings.equalsIgnoreCase(selectedCategory, 'JavaScript')}">JavaScript</option>
                                        <option value="Kotlin"     th:selected="${#strings.equalsIgnoreCase(selectedCategory, 'Kotlin')}">Kotlin</option>
                                        <option value="C#"         th:selected="${#strings.equals(selectedCategory, 'C#')}">C#</option>
                                        <option value="기타"       th:selected="${#strings.equalsIgnoreCase(selectedCategory, 'etc')}">기타 언어</option>
                                        <option value="free"       th:selected="${#strings.equalsIgnoreCase(selectedCategory, 'free')}">자유</option>
                                    </select>
                                </div>

                                <div id="pointsDiv" class="col-md-6 d-none">
                                    <label for="stakedPoints" class="form-label">질문 포인트</label>
                                    <select class="form-select" id="stakedPoints" name="stakedPoints">
                                        <option value="10">10 포인트</option>
                                        <option value="30">30 포인트</option>
                                        <option value="50">50 포인트</option>
                                        <option value="100">100 포인트</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label for="title" class="form-label">제목</label> 
                                    <input type="text" class="form-control" id="title" name="title" placeholder="제목을 입력하세요" required>
                                </div>

                                <div class="col-12">
                                    <label for="content" class="form-label">내용</label>
                                    <div id="summernote"></div>
                                    <textarea id="content" name="content" class="d-none" aria-hidden="true" tabindex="-1"></textarea>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-end flex-wrap gap-2 mt-4">
                                <a th:href="@{/community/{category}(category=${selectedCategory}, page=0)}" class="community-ds-cta-warm">취소</a>
                                <button type="submit" class="community-ds-cta-primary border-0">저장하기</button>
                            </div>
                        </form>
                    </div>
                </article>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#summernote').summernote({
                dialogsInBody: true,
                placeholder: '내용을 입력하세요',
                tabsize: 2,
                height: 350,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        });
    </script>
    
    <script>
        function showCommunityError(message) {
            const el = document.getElementById('communityToast');
            const errEl = document.getElementById('writeFormError');
            if (errEl) {
                errEl.textContent = message;
                errEl.classList.remove('d-none');
            }
            if (!el) return;
            el.textContent = message;
            el.classList.remove('d-none', 'alert-success');
            el.classList.add('alert-danger');
            setTimeout(function () {
                el.classList.add('d-none');
            }, 5000);
        }

        document.getElementById('category').addEventListener('change', function() {
            const pointsDiv = document.getElementById('pointsDiv');
            if (this.value === 'free' || this.value === '') {
                pointsDiv.classList.add('d-none');
            } else {
                pointsDiv.classList.remove('d-none');
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            const categorySelect = document.getElementById('category');
            const pointsDiv = document.getElementById('pointsDiv');
            if (categorySelect.value !== 'free' && categorySelect.value !== '') {
                pointsDiv.classList.remove('d-none');
            }
        });

        document.getElementById('writeForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const errLine = document.getElementById('writeFormError');
            if (errLine) {
                errLine.textContent = '';
                errLine.classList.add('d-none');
            }
            const saveBtn = event.target.querySelector('button[type="submit"]');
            if (saveBtn) saveBtn.disabled = true;

            const summernoteContent = $('#summernote').summernote('code');
            document.getElementById('content').value = summernoteContent;

            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const content = document.getElementById('content').value;
            const stakedPoints = document.getElementById('stakedPoints').value;
            const categoryIsQuestion = document.getElementById('category').value !== 'free';

            const data = {
                title: title,
                category: category,
                content: content,
                stakedPoints: categoryIsQuestion ? parseInt(stakedPoints, 10) : 0
            };

            function listSegment(cat) {
                if (cat === 'free') return 'free';
                if (cat === '기타') return 'etc';
                return cat;
            }

            const token = document.querySelector("meta[name='_csrf']")?.content;
			const header = document.querySelector("meta[name='_csrf_header']")?.content;
			const headers = { 'Content-Type': 'application/json' };
			if (token && header) {
				headers[header] = token;
			}

            fetch('/api/boards', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    const seg = listSegment(category);
                    location.href = '/community/' + encodeURIComponent(seg) + '?page=0';
                } else {
                    response.text().then(text => {
                         try {
                             const err = JSON.parse(text);
                             showCommunityError("게시글 등록 실패: " + (err.message || "알 수 없는 오류"));
                         } catch (e) {
                             showCommunityError("게시글 등록 실패: " + text);
                         }
                         if (saveBtn) saveBtn.disabled = false;
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showCommunityError("오류가 발생했습니다.");
                if (saveBtn) saveBtn.disabled = false;
            });
        });
    </script>
</th:block>
</body>
</html>
