<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/default_layout}">
<head>
	<title>검색 결과</title>
	<th:block layout:fragment="extra-head">
		<link th:href="@{/css/search.css}" rel="stylesheet" />
	</th:block>
</head>
<body>
<div layout:fragment="content" class="ui-view page-search">

	<header class="page-search__header">
		<h1 class="page-search__title">
			<span class="page-search__keyword" th:text="${keyword}"></span> 검색 결과
		</h1>
		<p class="page-search__count" th:if="${searchCount != null}">
			총 <strong th:text="${searchCount}">0</strong>건
		</p>
	</header>

	<form class="page-search__toolbar" th:action="@{/search}" method="get" id="searchFilterForm">
		<input type="hidden" name="keyword" th:value="${keyword}" />
		<div>
			<label for="searchSort">정렬</label>
			<select class="form-select" id="searchSort" name="sort" onchange="this.form.submit()">
				<option value="recent" th:selected="${sort == 'recent'}">최신순</option>
				<option value="oldest" th:selected="${sort == 'oldest'}">오래된순</option>
				<option value="title" th:selected="${sort == 'title'}">제목 가나다순</option>
			</select>
		</div>
		<div>
			<label for="searchType">유형</label>
			<select class="form-select" id="searchType" name="type" onchange="this.form.submit()">
				<option value="all" th:selected="${typeFilter == 'all'}">전체</option>
				<option value="community" th:selected="${typeFilter == 'community'}">게시글</option>
				<option value="lecture" th:selected="${typeFilter == 'lecture'}">강좌 추천</option>
				<option value="contest" th:selected="${typeFilter == 'contest'}">공모전 정보</option>
				<option value="book" th:selected="${typeFilter == 'book'}">도서 추천</option>
				<option value="recruit" th:selected="${typeFilter == 'recruit'}">팀원 모집</option>
			</select>
		</div>
	</form>

	<th:block th:if="${searchList != null && !#lists.isEmpty(searchList)}">
		<ul class="page-search__list" role="list">
			<li th:each="board : ${searchList}">
				<a class="page-search__card text-decoration-none text-reset"
				   th:href="${board.url}">
					<div class="page-search__meta">
						<span class="page-search__type" th:text="${board.type}">유형</span>
						<span class="page-search__writer" th:text="${board.writer}">작성자</span>
					</div>
					<strong class="page-search__card-title" th:text="${board.title}">제목</strong>
					<p class="page-search__excerpt" th:text="${#strings.abbreviate(board.content, 140)}">요약</p>
					<time class="page-search__date" th:text="${board.createdAt != null ? #temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm') : ''}">날짜</time>
				</a>
			</li>
		</ul>
	</th:block>

	<div th:if="${searchList == null || #lists.isEmpty(searchList)}" class="ui-empty" role="status">
		<strong>검색 결과가 없습니다</strong>
		<span>다른 키워드로 검색하거나 유형 필터를 <b>전체</b>로 바꿔 보세요.</span>
	</div>

</div>
</body>
</html>
