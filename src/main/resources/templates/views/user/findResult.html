<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/default_layout}">

<div layout:fragment="content" class="ui-view">
	<div class="container">
		<div class="row justify-content-center align-items-center vh-100">
			<div class="col-lg-5 col-md-7 col-sm-9">
				<div class="card shadow-lg border-0 rounded-4">
					<div class="card-body p-4 p-sm-5">

						<th:block th:if="${user}">
							<th:block th:if="${isFindId}">
								<div class="text-center mb-4">
									<i class="bi bi-search display-4 text-primary"></i>
									<h1 class="h5 mt-2 ds-page-title">아이디 찾기 결과</h1>
								</div>

								<th:block th:each="users : ${user}">
									<div class="text-center my-4">
										<p>[[${users.userId}]]</p>
									</div>
								</th:block>
							</th:block>

							<th:block th:unless="${isFindId}">
								<div class="text-center mb-4">
									<i class="bi bi-search display-4 text-primary"></i>
									<h1 class="h5 mt-2 ds-page-title">비밀번호 재설정</h1>
								</div>

					            <form th:action="@{/updatePass}" method="POST" id="updatePassForm">
									<input type="hidden" name="userId" th:value="${user.userId}">
					
					                <div class="mb-3">
					                    <label for="pass" class="form-label">비밀번호</label>
					                    <div class="input-group">
					                        <span class="input-group-text" aria-hidden="true"><i class="bi bi-lock"></i></span>
					                        <input type="password" class="form-control" id="pass" name="pass" placeholder="비밀번호를 입력하세요" required autocomplete="new-password">
					                    </div>
					                </div>
					
					                <div class="mb-4">
					                    <label for="passConfirm" class="form-label">비밀번호 확인</label>
					                    <div class="input-group">
					                        <span class="input-group-text" aria-hidden="true"><i class="bi bi-check-lg"></i></span>
					                        <input type="password" class="form-control" id="passConfirm" name="passConfirm" placeholder="비밀번호를 다시 한번 입력하세요" required autocomplete="new-password">
					                    </div>
					                </div>
					
					                <div class="d-grid mb-3">
					                    <button type="submit" class="btn btn-primary btn-lg">재설정하기</button>
					                </div>
					            </form>
							</th:block>
						</th:block>

						<th:block th:unless="${user}">
							<div class="text-center mb-4">
								<i class="bi bi-search display-4 text-primary"></i>
								<h1 class="h5 mt-2 ds-page-title">찾기 결과</h1>
							</div>

							<div class="text-center mt-4">
								<p class="text-muted">검색된 결과가 없습니다.</p>
							</div>
						</th:block>

						<div class="d-grid mb-3">
							<a th:href="@{/loginForm}" class="btn btn-primary btn-lg text-center">로그인 화면으로 돌아가기</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script th:inline="javascript">
		document.getElementById('updatePassForm')?.addEventListener('submit', function (e) {
			const p = document.getElementById('pass');
			const c = document.getElementById('passConfirm');
			if (!p || !c) return;
			if (p.value !== c.value) {
				e.preventDefault();
				alert('비밀번호가 일치하지 않습니다.');
				p.focus();
			}
		});
	</script>
</div>

</html>
