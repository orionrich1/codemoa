<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/default_layout}">

<div layout:fragment="content" class="ui-view">	
	<div class="container my-5 ds-form-narrow">
		<h1 class="mb-4 ds-page-title">계정 정보 수정</h1>
    
	<form id="userUpdateForm" th:action="@{/my-pages/updateUser}" th:object="${userUpdateRequest}" method="post">
		<input type="hidden" name="isPassChange" id="isPassChange" value="0" />
		<div class="mb-3">
			<label for="userId" class="form-label">아이디</label>
			<input type="text" class="form-control" id="userId" th:value="${user.userId}" readonly />
		</div>
	
			<div class="form-check mb-3">
				<input class="form-check-input" type="checkbox" id="changePasswordCheck" name="changePasswordCheck" />
	        	<label class="form-check-label" for="changePasswordCheck">
	          	비밀번호 변경하기
	        	</label>
			</div>
	
			<div id="passwordSection" class="mb-3 d-none">
				<label for="currentPass" class="form-label">현재 비밀번호</label>
	        	<input type="password" class="form-control mb-2" id="currentPass" name="currentPass" />
	
	        	<label for="newPass" class="form-label">새 비밀번호</label>
	        	<input type="password" class="form-control mb-2" id="newPass" name="newPass" th:field="*{newPass}" />
	
	        	<label for="passConfirm" class="form-label">새 비밀번호 확인</label>
	        	<input type="password" class="form-control" id="passConfirm" name="passConfirm" />
			</div>
	
			<div class="mb-3">
		        <label for="name" class="form-label">이름</label>
		        <input type="text" class="form-control" id="name" th:field="*{name}" required />
				<p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
			</div>
	
			<div class="mb-3">
		        <label for="nickname" class="form-label">닉네임</label>
		        <input type="text" class="form-control" id="nickname" th:field="*{nickname}" required />
				<p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></p>
			</div>
	
			<div class="mb-3">
		        <label for="mobile" class="form-label">휴대폰 번호</label>
		        <input type="tel" class="form-control" pattern="[0-9]*" id="mobile" th:field="*{mobile}" required />
				<p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></p>
			</div>
	
			<div class="mb-3">
		        <label for="email" class="form-label">이메일</label>
		        <input type="email" class="form-control" id="email" th:field="*{email}" required />
				<p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
			</div>
	
			<button type="submit" class="btn btn-primary">정보 수정 완료</button>
		</form>
	</div>
	<script th:inline="javascript">window.MYPAGE_CHECK_PASS_URL = /*[[@{/my-pages/checkPass}]]*/ '/my-pages/checkPass';</script>
	<script th:src="@{/js/mypage/mypage.js}"></script>
</div>
</html>
