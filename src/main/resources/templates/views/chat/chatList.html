<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>채팅방 목록</title>
</head>
<body>
<div layout:fragment="content" class="ui-view ds-page-chat">
    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="text-center mb-4">
                    <p class="ds-section-kicker mb-1">Community</p>
                    <h1 class="h2 mb-0">채팅방 목록</h1>
                </div>
                <div class="card shadow-sm border-0">
                    <div class="card-header d-flex align-items-center justify-content-between py-3">
                        <span class="fw-medium">방 목록</span>
                    </div>
                    <div class="card-body p-0">
                        <div sec:authorize="isAuthenticated() and authentication.principal.getUser().getGrade().name().equalsIgnoreCase('admin')" class="p-3 border-bottom">
                            <form th:action="@{/chat/room}" method="post" class="d-flex flex-wrap gap-2">
                                <input type="text" name="name" class="form-control flex-grow-1" placeholder="새 채팅방 이름" required>
                                <button type="submit" class="btn btn-primary text-nowrap">방 만들기</button>
                            </form>
                        </div>
                        <ul class="list-group list-group-flush">
                            <li th:each="room : ${rooms}" class="list-group-item px-3 py-3">
                                <a th:href="@{/chat/room/{roomId}(roomId=${room.roomId})}" th:text="${room.name}" class="text-decoration-none text-reset stretched-link"></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
