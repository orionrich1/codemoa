<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>CodeMoa</title>
    <link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet" >
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Inter:wght@400;500;600&family=DM+Serif+Display:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap">
    <link th:href="@{/css/common.css}" rel="stylesheet" >
    <link th:href="@{/css/site-ds.css}" rel="stylesheet" >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" th:href="@{/favicon.ico}">

    <th:block layout:fragment="extra-head"></th:block>
    
    <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
</head>
<body class="ui-root site-ds">
    <header th:replace="~{fragments/header::header}"></header>

    <main class="ui-page-shell">
        <div layout:fragment="content"></div>
    </main>
    
    <footer th:replace="~{fragments/footer::footer}"></footer> 
    
    <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
    
    <th:block layout:fragment="script"></th:block>
    
</body>
</html>
