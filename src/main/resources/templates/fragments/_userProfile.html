<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="userProfile(nickname, iconName)" 
         class="d-flex align-items-center ds-userprofile-gap">
        
        <img th:src="@{/images/rank/{icon}.png(icon=${iconName})}"
             th:alt="${nickname}" 
             class="ds-rank-icon-sm align-middle">
             
        <span class="fw-medium ds-userprofile-nickname" th:text="${nickname}">Nickname</span>
    </div>
</body>
</html>
